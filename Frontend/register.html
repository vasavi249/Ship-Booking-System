<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ship Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🚢 ShipBooker</a>
        <ul class="nav-links" id="nav-links"></ul>
    </nav>

    <div id="alertBox" class="alert" style="display:none; position:absolute; top:80px; left:50%; transform:translateX(-50%); z-index:1000; min-width:300px; text-align:center;"></div>

    <div class="glass-container" style="margin-top: 5rem;">
        <h2 style="text-align: center; color: var(--secondary); margin-bottom: 2rem;">Passenger Registration</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="full_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Nationality</label>
                <input type="text" id="nationality" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Passport Number</label>
                <input type="text" id="passport_number" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary">Register</button>
            <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="login.html" style="color: var(--primary);">Login here</a></p>
        </form>
    </div>

    <footer style="margin-top: auto;">
        <p>&copy; 2026 Ship Booking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                nationality: document.getElementById('nationality').value,
                passport_number: document.getElementById('passport_number').value,
                password: document.getElementById('password').value,
            };
            registerPassenger(data);
        });
    </script>
</body>
</html>
