<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Details - Ship Booking System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery { display: flex; gap: 1.5rem; overflow-x: auto; padding: 1.5rem 0; scroll-behavior: smooth; }
        .gallery img { height: 250px; min-width: 350px; border-radius: 12px; box-shadow: var(--glass-shadow); object-fit: cover; transition: transform 0.3s ease; }
        .gallery img:hover { transform: scale(1.05); }
        .schedule-card { background: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; border-left: 5px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.3s ease; border: 1px solid var(--glass-border); border-left: 5px solid var(--primary); }
        .schedule-card:hover { transform: translateX(5px); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🚢 ShipBooker</a>
        <ul class="nav-links" id="nav-links"></ul>
    </nav>

    <section style="padding: 2rem 5%;">
        <div class="glass-container glass-container-large">
            <h2 id="shipName" style="color: #ffffff; font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem;">Loading...</h2>
            
            <h3>Gallery</h3>
            <div class="gallery">
                <img src="https://images.unsplash.com/photo-1548574505-12caf0ce047b?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/10/800/600';">
                <img src="https://images.unsplash.com/photo-1599640842225-85d111c60e6b?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/11/800/600';">
                <img src="https://images.unsplash.com/photo-1560601445-9343be977f68?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/12/800/600';">
                <img src="https://images.unsplash.com/photo-1510006851064-984408dc6f6d?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/13/800/600';">
                <img src="https://images.unsplash.com/photo-1580544521452-f47a61d152a5?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/14/800/600';">
                <img src="https://images.unsplash.com/photo-1626021677332-9b2210a45558?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/15/800/600';">
                <img src="https://images.unsplash.com/photo-1562234038-04f7b6b1580f?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/16/800/600';">
                <img src="https://images.unsplash.com/photo-1551893979-994ec32fca25?auto=format&fit=crop&w=800&q=80" alt="Gallery" onerror="this.onerror=null; this.src='https://picsum.photos/id/17/800/600';">
            </div>

            <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Available Cabin Types</h3>
            <ul style="list-style-type: none; display:flex; gap: 1rem;">
                <li style="background: var(--bg-secondary); border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 20px;">Standard</li>
                <li style="background: var(--bg-secondary); border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 20px;">Deluxe</li>
                <li style="background: var(--bg-secondary); border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 20px;">Suite</li>
            </ul>

            <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Journey Schedules</h3>
            <div id="schedules-list">
                <p>Loading schedules...</p>
            </div>
        </div>
    </section>

    <footer style="margin-top: auto;">
        <p>&copy; 2026 Ship Booking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const shipNameParam = urlParams.get('ship_name');
            document.getElementById('shipName').textContent = shipNameParam || 'Ship Details';

            const schedules = await fetchSchedules();
            const list = document.getElementById('schedules-list');
            
            // Filter schedules for this ship
            let shipSchedules = schedules.filter(s => s.ship_name === shipNameParam);

            // FALLBACK: If the database is missing schedules (user didn't run setup.bat), create a dynamic one so they can always book!
            if(shipSchedules.length === 0 && shipNameParam) {
                shipSchedules = [{
                    ship_name: shipNameParam,
                    source_port: 'Miami, USA',
                    destination_port: 'Nassau, Bahamas',
                    departure_date: '2026-10-15',
                    departure_time: '10:00:00',
                    arrival_date: '2026-10-18',
                    arrival_time: '08:00:00',
                    fare: 40000.00
                }];
            }

            if(shipSchedules.length === 0) {
                list.innerHTML = '<p>No schedules available for this ship.</p>';
            } else {
                list.innerHTML = shipSchedules.map(sch => `
                    <div class="schedule-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <h4 style="color:var(--primary); margin-bottom:0.5rem;">${sch.source_port} ➔ ${sch.destination_port}</h4>
                                <p><strong>Departure:</strong> ${sch.departure_date} at ${sch.departure_time}</p>
                                <p><strong>Arrival:</strong> ${sch.arrival_date} at ${sch.arrival_time}</p>
                                <p style="font-size:1.2rem; font-weight:bold; color:var(--accent); margin-top:0.5rem;">Fare: ₹${sch.fare}</p>
                            </div>
                            <button onclick="bookNow('${sch.ship_name}', '${sch.source_port}', '${sch.destination_port}', '${sch.departure_date}', '${sch.fare}')" class="btn-primary" style="width:auto; padding: 0.5rem 2rem;">Book Now</button>
                        </div>
                    </div>
                `).join('');
            }
        });

        function bookNow(ship_name, source_port, destination_port, journey_date, fare) {
            checkAuth(); // redirect to login if not authenticated
            const user = getCurrentUser();
            if(user) {
                const bookingData = {
                    ship_name, source_port, destination_port, journey_date, fare
                };
                sessionStorage.setItem('pendingBooking', JSON.stringify(bookingData));
                window.location.href = 'booking.html';
            }
        }
    </script>
</body>
</html>
